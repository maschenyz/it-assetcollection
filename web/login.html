<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuna Asset | Sign In</title>
    <meta name="description" content="Yuna Asset Management System - Secure Login">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Soft background blobs */
        body::before {
            content: '';
            position: fixed;
            top: -150px; left: -150px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(168, 213, 186, 0.4), transparent 70%);
            border-radius: 50%;
            animation: blobFloat 8s ease-in-out infinite alternate;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -150px; right: -100px;
            width: 450px; height: 450px;
            background: radial-gradient(circle, rgba(243, 209, 158, 0.35), transparent 70%);
            border-radius: 50%;
            animation: blobFloat 10s ease-in-out infinite alternate-reverse;
        }

        @keyframes blobFloat {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(30px, 30px) scale(1.05); }
        }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.04);
            animation: cardIn 0.5s ease-out;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-area {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
            animation: logoSpin 3s ease-in-out infinite;
        }

        @keyframes logoSpin {
            0%, 100% { transform: rotate(-5deg) scale(1); }
            50%       { transform: rotate(5deg) scale(1.1); }
        }

        .logo-title {
            font-size: 26px;
            font-weight: 800;
            color: #2d3436;
            letter-spacing: -0.5px;
        }

        .logo-subtitle {
            font-size: 13px;
            color: #a0adb8;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #636e72;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid #e8ecf0;
            border-radius: 14px;
            font-size: 15px;
            font-family: 'Nunito', sans-serif;
            color: #2d3436;
            background: #f8fafc;
            transition: all 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #a8d5ba;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(168, 213, 186, 0.15);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #a8d5ba, #81c9a0);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 8px;
            letter-spacing: 0.3px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(129, 201, 160, 0.4);
        }

        .login-btn:active { transform: translateY(0); }

        .login-btn.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .error-msg {
            margin-top: 16px;
            padding: 12px 16px;
            background: rgba(224, 122, 95, 0.1);
            border: 1px solid rgba(224, 122, 95, 0.3);
            border-radius: 10px;
            color: #e07a5f;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            display: none;
        }

        .error-msg.show { display: block; animation: shake 0.4s ease; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25%       { transform: translateX(-8px); }
            75%       { transform: translateX(8px); }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-area">
                <span class="logo-icon">💠</span>
                <div class="logo-title">Yuna Asset</div>
                <div class="logo-subtitle">IT Asset Management System</div>
            </div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"
                    onkeydown="if(event.key==='Enter') performLogin()">
            </div>

            <button class="login-btn" id="login-btn" onclick="performLogin()">Sign In →</button>
            <div class="error-msg" id="error-msg"></div>
        </div>
    </div>

    <script>
        // Redirect ถ้ามี token อยู่แล้ว
        if (localStorage.getItem('yuna_access_token')) {
            window.location.href = '/';
        }

        async function performLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const errEl = document.getElementById('error-msg');

            if (!username || !password) {
                showError('กรุณากรอก Username และ Password ค่ะ');
                return;
            }

            btn.classList.add('loading');
            btn.textContent = 'กำลังเข้าสู่ระบบ...';
            errEl.classList.remove('show');

            try {
                const res = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok && data.access_token) {
                    localStorage.setItem('yuna_access_token', data.access_token);
                    localStorage.setItem('yuna_role', data.role || 'viewer');
                    window.location.href = '/';
                } else {
                    showError(data.detail || 'Username หรือ Password ไม่ถูกต้องค่ะ');
                }
            } catch (e) {
                showError('เชื่อมต่อ Server ไม่ได้ กรุณาลองใหม่อีกครั้งค่ะ');
            } finally {
                btn.classList.remove('loading');
                btn.textContent = 'Sign In →';
            }
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.classList.remove('show');
            void el.offsetWidth; // reflow for animation replay
            el.classList.add('show');
        }
    </script>
</body>
</html>
