<!-- VIEW: REPORTS -->
<section x-show="view==='reports'" x-cloak>
    <div class="stats-row mb-4">
        <div class="stat-card">
            <div class="stat-body"><div class="stat-value" x-text="stats.total"></div><div class="stat-label">Assets Reported</div></div>
        </div>
        <div class="stat-card">
            <div class="stat-body"><div class="stat-value" x-text="software.length"></div><div class="stat-label">Unique Software</div></div>
        </div>
        <button class="btn-primary" @click="exportCSV()" style="height: fit-content; align-self: center;">📥 Download CSV Report</button>
    </div>
    <div class="card">
        <div class="card-header"><h3 class="card-title">System Status Overview</h3></div>
        <div class="p-4 text-center text-muted">📊 Detailed charts and PDF export coming soon in Satoyama v3!</div>
    </div>
</section>
